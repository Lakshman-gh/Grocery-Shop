<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Grocery Shop</title>

<link rel="manifest" href="manifest.json">

<style>
body { font-family: Arial; margin: 0; background: #f2f2f2; }
header { background: #2e7d32; color: white; text-align: center; padding: 15px; }
.container { padding: 10px; }
.products { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; }
.product { background: white; padding: 10px; border-radius: 10px; text-align: center; }
.product img { width: 100%; height: 120px; border-radius: 8px; object-fit: cover; }
.qty { width: 60px; margin-top: 5px; }
.form { background: white; padding: 10px; margin-top: 10px; border-radius: 10px; }
input, select { width: 100%; padding: 8px; margin-top: 5px; }
.cart { position: fixed; bottom: 0; width: 100%; background: white; padding: 10px; border-top: 1px solid #ccc; }
button { background: #43a047; color: white; border: none; padding: 10px; width: 100%; border-radius: 5px; margin-top: 5px; }
.whatsapp { background: #25D366; }
</style>
</head>

<body>

<header>
🛒 My Grocery Shop
<p style="font-size:14px;">Call/WhatsApp: 077XXXXXXX</p>
</header>

<div class="container">

<!-- Products -->
<div class="products" id="productList">Loading products...</div>

<!-- Customer Details -->
<div class="form">
<h3>Customer Details</h3>
<input type="text" id="name" placeholder="Your Name">
<input type="text" id="phone" placeholder="Phone Number">
<input type="text" id="address" placeholder="Delivery Address">

<select id="area">
<option value="">Select Area</option>
<option value="Colombo">Colombo (LKR 150)</option>
<option value="Suburb">Suburb (LKR 250)</option>
</select>
</div>

<!-- Payment -->
<div class="form">
<h3>Payment Method</h3>
<select id="payment">
<option value="COD">Cash on Delivery</option>
<option value="Bank">Bank Transfer</option>
</select>

<div id="bankDetails" style="display:none;">
<p><strong>Bank:</strong> Commercial Bank</p>
<p><strong>Account:</strong> 1234567890</p>
<p><strong>Name:</strong> My Grocery Shop</p>
</div>
</div>

<div class="cart">
  <div id="total">Total: LKR 0</div>
  <button class="whatsapp" onclick="order()">Order via WhatsApp</button>
</div>

<script>

// ✅ Google Sheet CSV URL
const sheetURL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTQ6YvbWgmfz-rYvO5f-Xc7QMavzije_aGv9GiK7R4Qc2RvkMsdOyTvj8g23sTBxgok0Hp5oGD8vYg7/pub?gid=0&single=true&output=csv";

// Load products
fetch(sheetURL)
.then(res => res.text())
.then(data => {
  let rows = data.trim().split("\n").slice(1);
  let html = "";

  rows.forEach((row, index) => {
    let cols = row.split(",");
    if(cols.length < 3) return;

    let name = cols[0].trim();
    let price = parseInt(cols[1]);
    let image = cols[2].trim();

    html += `
    <div class="product">
      <img src="${image}" onerror="this.src='images/rice.jpg'">
      <h4>${name}</h4>
      <p>LKR ${price}</p>

      <div class="qty-box">
        <button onclick="changeQty(${index}, -1)">−</button>
        <span id="qty-${index}">0</span>
        <button onclick="changeQty(${index}, 1)">+</button>
      </div>
    </div>`;
  });

  document.getElementById("productList").innerHTML = html;
});

// Store quantities
let cart = {};

// Change quantity
function changeQty(index, change) {
  if (!cart[index]) cart[index] = 0;
  cart[index] += change;

  if (cart[index] < 0) cart[index] = 0;

  document.getElementById(`qty-${index}`).innerText = cart[index];
  updateTotal();
}

// Update total
function updateTotal() {
  let total = 0;
  let products = document.querySelectorAll(".product");

  products.forEach((p, index) => {
    let price = parseInt(p.querySelector("p").innerText.replace("LKR ",""));
    let qty = cart[index] || 0;
    total += price * qty;
  });

  document.getElementById("total").innerText = "Total: LKR " + total;
}

// Order function
function order() {
  let items = [];
  let total = 0;

  let products = document.querySelectorAll(".product");

  products.forEach((p, index) => {
    let qty = cart[index] || 0;
    if (qty > 0) {
      let name = p.querySelector("h4").innerText;
      let price = parseInt(p.querySelector("p").innerText.replace("LKR ",""));

      items.push(`${name} x ${qty}`);
      total += price * qty;
    }
  });

  if (items.length === 0) {
    alert("Select items first");
    return;
  }

  let cname = document.getElementById("name").value;
  let cphone = document.getElementById("phone").value;
  let caddr = document.getElementById("address").value;
  let area = document.getElementById("area").value;
  let payment = document.getElementById("payment").value;

  if (!cname || !cphone || !caddr || !area) {
    alert("Fill all details");
    return;
  }

  let delivery = area === "Colombo" ? 150 : 250;
  total += delivery;

  let msg = "🛒 Grocery Order%0A%0A";
  msg += items.join("%0A");
  msg += `%0A%0ADelivery: LKR ${delivery}`;
  msg += `%0ATotal: LKR ${total}`;
  msg += `%0APayment: ${payment}`;
  msg += `%0A%0AName: ${cname}`;
  msg += `%0APhone: ${cphone}`;
  msg += `%0AAddress: ${caddr}`;

  let shopPhone = "94772054791";
  window.open(`https://wa.me/${shopPhone}?text=${msg}`, "_blank");
}

</script>

</body>
</html>
