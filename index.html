<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Grocery Shop</title>

<link rel="manifest" href="manifest.json">

<style>
body { font-family: Arial; margin: 0; background: #f2f2f2; }
header { background: #2e7d32; color: white; text-align: center; padding: 15px; }
.container { padding: 10px; }
.products { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; }
.product { background: white; padding: 10px; border-radius: 10px; text-align: center; }
.product img { width: 100%; height: 120px; border-radius: 8px; object-fit: cover; }
.qty { width: 60px; margin-top: 5px; }
.form { background: white; padding: 10px; margin-top: 10px; border-radius: 10px; }
input, select { width: 100%; padding: 8px; margin-top: 5px; }
.cart { position: fixed; bottom: 0; width: 100%; background: white; padding: 10px; border-top: 1px solid #ccc; }
button { background: #43a047; color: white; border: none; padding: 10px; width: 100%; border-radius: 5px; margin-top: 5px; }
.whatsapp { background: #25D366; }
</style>
</head>

<body>

<header>
🛒 My Grocery Shop
<p style="font-size:14px;">Call/WhatsApp: 077XXXXXXX</p>
</header>

<div class="container">

<!-- Products -->
<div class="products" id="productList">Loading products...</div>

<!-- Customer Details -->
<div class="form">
<h3>Customer Details</h3>
<input type="text" id="name" placeholder="Your Name">
<input type="text" id="phone" placeholder="Phone Number">
<input type="text" id="address" placeholder="Delivery Address">

<select id="area">
<option value="">Select Area</option>
<option value="Colombo">Colombo (LKR 150)</option>
<option value="Suburb">Suburb (LKR 250)</option>
</select>
</div>

<!-- Payment -->
<div class="form">
<h3>Payment Method</h3>
<select id="payment">
<option value="COD">Cash on Delivery</option>
<option value="Bank">Bank Transfer</option>
</select>

<div id="bankDetails" style="display:none;">
<p><strong>Bank:</strong> Commercial Bank</p>
<p><strong>Account:</strong> 1234567890</p>
<p><strong>Name:</strong> My Grocery Shop</p>
</div>
</div>

</div>

<!-- Cart -->
<div class="cart">
<button class="whatsapp" onclick="order()">Order via WhatsApp</button>
</div>

<script>
// ✅ Use proper CSV link (output=csv)
const sheetURL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTQ6YvbWgmfz-rYvO5f-Xc7QMavzije_aGv9GiK7R4Qc2RvkMsdOyTvj8g23sTBxgok0Hp5oGD8vYg7/pub?output=csv";

// Load products
fetch(sheetURL)
.then(res => res.text())
.then(data => {
  let rows = data.trim().split("\n").slice(1);
  let html = "";
  rows.forEach(row => {
    // Safe CSV split
    let cols = row.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
    if(cols.length < 3) return;

    let name = cols[0].replace(/"/g, "");
    let price = parseInt(cols[1]);
    let img = cols[2].replace(/"/g, "");

    html += `
    <div class="product">
      <img src="${img || 'https://via.placeholder.com/150'}">
      <h4>${name}</h4>
      <p>LKR ${price}</p>
      <input type="number" class="qty" min="0" value="0">
    </div>`;
  });

  document.getElementById("productList").innerHTML = html;
})
.catch(() => {
  document.getElementById("productList").innerHTML =
    "<p>⚠️ Failed to load products</p>";
});

// Order function
function order() {
  let items = [];
  let total = 0;

  document.querySelectorAll(".product").forEach(p => {
    let name = p.querySelector("h4").innerText;
    let price = parseInt(p.querySelector("p").innerText.replace("LKR ",""));
    let qty = parseInt(p.querySelector(".qty").value) || 0;

    if(qty > 0){
      items.push(`${name} x ${qty}`);
      total += price * qty;
    }
  });

  if(items.length === 0){
    alert("Please select at least one item");
    return;
  }

  let cname = document.getElementById("name").value.trim();
  let cphone = document.getElementById("phone").value.trim();
  let caddr = document.getElementById("address").value.trim();
  let area = document.getElementById("area").value;
  let payment = document.getElementById("payment").value;

  if(!cname || !cphone || !caddr || !area){
    alert("Please fill all details");
    return;
  }

  if(!/^\d{10}$/.test(cphone)){
    alert("Enter valid 10-digit phone number");
    return;
  }

  let delivery = area === "Colombo" ? 150 : 250;
  total += delivery;

  let msg = `🛒 Grocery Order

${items.join("\n")}

Delivery: LKR ${delivery}
Total: LKR ${total}
Payment: ${payment}

Name: ${cname}
Phone: ${cphone}
Address: ${caddr}`;

  let encodedMsg = encodeURIComponent(msg);
  let shopPhone = "94772054791";

  window.open(`https://wa.me/${shopPhone}?text=${encodedMsg}`, "_blank");
}

// Payment toggle
document.addEventListener("DOMContentLoaded", function() {
  document.getElementById("payment").addEventListener("change", function(){
    document.getElementById("bankDetails").style.display =
      this.value === "Bank" ? "block" : "none";
  });
});

// Service worker
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js');
}
</script>

</body>
</html>
